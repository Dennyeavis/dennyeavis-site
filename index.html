<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis 💰</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
header{background:#003399;color:#fff;padding:15px;display:flex;justify-content:space-between;flex-wrap:wrap}
button{padding:8px 12px;margin:2px;border:none;border-radius:8px;background:#ffcc00;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
.badge{background:#00c853;color:#fff;padding:3px 6px;border-radius:6px;font-size:10px}
.top{background:#ff5252}
</style>
</head>
<body>

<header>
<div><b>Den Nye Avis 🚀</b></div>
<div>
<span id="user">Ikke logget ind</span>
<button onclick="googleLogin()">Google Login</button>
<button onclick="login()">Email Login</button>
<button onclick="logout()">Logout</button>
<button onclick="toggleMyAds()">Mine annoncer</button>
<button onclick="openModal()">Ny annonce</button>
</div>
</header>

<div class="grid" id="listings"></div>

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008">
<div style="background:#fff;padding:20px;margin:50px auto;width:300px">
<h3>Ny annonce</h3>
<input id="title" placeholder="Titel"><br>
<input id="price" placeholder="Pris"><br>
<input type="file" id="image"><br><br>
<button onclick="save()">Gem</button>
<button onclick="closeModal()">Luk</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;
let showMine = false;

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function login(){
  const email = prompt("Email:");
  const password = prompt("Kode:");

  auth.signInWithEmailAndPassword(email,password)
  .catch(()=>{
    auth.createUserWithEmailAndPassword(email,password);
  });
}

function logout(){ auth.signOut(); }

// STATUS
auth.onAuthStateChanged(user=>{
  currentUser = user;
  document.getElementById("user").innerText = user ? "✅ "+user.email : "❌ Ikke logget ind";
  loadAds();
});

function toggleMyAds(){
  showMine = !showMine;
  loadAds();
}

function loadAds(){
  const container = document.getElementById("listings");

  db.collection("listings").orderBy("created","desc").onSnapshot(snapshot=>{
    container.innerHTML="";

    snapshot.forEach(doc=>{
      const d = doc.data();

      if(showMine && currentUser && d.user !== currentUser.uid) return;

      const div = document.createElement("div");
      div.className="card";

      div.innerHTML = `
        <div class="badge ${d.premium ? 'top' : ''}">${d.premium ? '⭐ PREMIUM' : (d.user === currentUser?.uid ? 'MIN' : '')}</div>
        <img src="${d.image || 'https://via.placeholder.com/200'}" width="100%">
        <h4>${d.title}</h4>
        <p>${d.price} kr</p>

        ${currentUser && d.user === currentUser.uid ? `
        <button onclick="deleteAd('${doc.id}')">Slet</button>
        <button onclick="boostAd('${doc.id}')">🚀 Boost (19 kr)</button>
        <button onclick="premiumAd('${doc.id}')">⭐ Premium (49 kr)</button>
        ` : ""}
      `;

      container.appendChild(div);
    });
  });
}

function openModal(){
  if(!currentUser) return alert("Log ind først");
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function save(){
  if(!currentUser) return alert("Log ind først");

  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

  if(!title || !price) return alert("Udfyld felter");

  if(!file){
    db.collection("listings").add({
      title, price, user: currentUser.uid, created: Date.now(), premium:false
    });
    closeModal();
    return;
  }

  const reader = new FileReader();
  reader.onload = e=>{
    db.collection("listings").add({
      title,
      price,
      image: e.target.result,
      user: currentUser.uid,
      created: Date.now(),
      premium:false
    });
    closeModal();
  };
  reader.readAsDataURL(file);
}

function deleteAd(id){
  db.collection("listings").doc(id).delete();
}

// 💰 MONEY
function boostAd(id){
  alert("Send 19 kr til MobilePay: 22473434\nSkriv din annonce titel 💰");
}

function premiumAd(id){
  alert("Send 49 kr til MobilePay: 22473434\nDu får TOP placering ⭐");
}

// 🔥 FOMO EFFECT
setInterval(()=>{
  const msg = document.createElement("div");
  msg.innerText = "🔥 En annonce blev lige boostet!";
  msg.style.position="fixed";
  msg.style.bottom="20px";
  msg.style.left="20px";
  msg.style.background="#00c853";
  msg.style.color="#fff";
  msg.style.padding="10px";
  msg.style.borderRadius="10px";
  document.body.appendChild(msg);
  setTimeout(()=>msg.remove(),3000);
},15000);

</script>

</body>
</html>
