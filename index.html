<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis 🚀</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
header{background:#003399;color:#fff;padding:15px;display:flex;justify-content:space-between;flex-wrap:wrap}
button{padding:8px 12px;margin:2px;border:none;border-radius:8px;background:#ffcc00;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
</style>
</head>
<body>

<header>
<div><b>Den Nye Avis 🚀</b></div>
<div>
<span id="user">Ikke logget ind</span>
<button onclick="googleLogin()">Google Login</button>
<button onclick="magicLogin()">Login via Email</button>
<button onclick="logout()">Logout</button>
<button onclick="openModal()">Ny annonce</button>
</div>
</header>

<div class="grid" id="listings"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;

// 🔵 GOOGLE LOGIN
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// ✉️ MAGIC LOGIN
function magicLogin(){
  const email = prompt("Indtast din email:");

  const actionCodeSettings = {
    url: window.location.href,
    handleCodeInApp: true
  };

  auth.sendSignInLinkToEmail(email, actionCodeSettings)
  .then(()=>{
    localStorage.setItem('emailForSignIn', email);
    alert("Tjek din email og klik på linket 🔥");
  })
  .catch(e=>alert(e.message));
}

// 🔑 AUTO LOGIN VIA LINK
if(auth.isSignInWithEmailLink(window.location.href)){
  let email = localStorage.getItem('emailForSignIn');
  if(!email){ email = prompt('Bekræft din email'); }

  auth.signInWithEmailLink(email, window.location.href)
  .then(()=>{
    localStorage.removeItem('emailForSignIn');
    alert("Logget ind via email ✅");
  })
  .catch(e=>alert(e.message));
}

// 🚪 LOGOUT
function logout(){ auth.signOut(); }

// 👤 STATUS
auth.onAuthStateChanged(user=>{
  currentUser = user;
  document.getElementById("user").innerText = user ? "✅ "+user.email : "❌ Ikke logget ind";
  loadAds();
});

// 📦 ADS
function loadAds(){
  const container = document.getElementById("listings");

  db.collection("listings").onSnapshot(snapshot=>{
    container.innerHTML="";
    snapshot.forEach(doc=>{
      const d = doc.data();
      const div = document.createElement("div");
      div.className="card";
      div.innerHTML = `<h4>${d.title}</h4><p>${d.price} kr</p>`;
      container.appendChild(div);
    });
  });
}

// ➕ NY ANNONCE
function openModal(){
  if(!currentUser) return alert("Log ind først");
  const title = prompt("Titel");
  const price = prompt("Pris");

  db.collection("listings").add({
    title, price, user: currentUser.uid, created: Date.now()
  });
}

</script>

</body>
</html>
