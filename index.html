<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis 🚀 DEBUG FIX</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff}
header{background:#003399;padding:10px;display:flex;justify-content:space-between;flex-wrap:wrap}
button{margin:3px;padding:8px;border-radius:10px;border:none;background:#ffcc00;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;padding:10px}
.card{background:#1e293b;padding:10px;border-radius:12px}
img{width:100%;border-radius:8px}
</style>
</head>
<body>

<header>
<div><b>Den Nye Avis 🚀</b></div>
<div>
<span id="user">Ikke logget ind</span>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="toggleMine()">Mine annoncer</button>
<button onclick="openModal()">+ Opret</button>
</div>
</header>

<div class="grid" id="listings"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a",
  storageBucket: "dennyeavis-f2b4a.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

let user = null;
let showMine = false;

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout(){auth.signOut();}

auth.onAuthStateChanged(u=>{
  user = u;
  document.getElementById("user").innerText = u ? "✅ " + u.email : "❌ Ikke logget ind";
  load();
});

function toggleMine(){
  showMine = !showMine;
  load();
}

function load(){
  const box = document.getElementById("listings");

  db.collection("listings").orderBy("created","desc").onSnapshot(snap=>{
    box.innerHTML = "";

    snap.forEach(doc=>{
      const d = doc.data();

      if(showMine && user && d.user !== user.uid) return;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${d.image || 'https://via.placeholder.com/300'}">
        <h3>${d.title || ''}</h3>
        <p>${d.price || ''} kr</p>
        ${user && d.user===user.uid ? `<button onclick="deleteAd('${doc.id}')">Slet</button>` : ""}
      `;

      box.appendChild(div);
    });
  });
}

function openModal(){
  if(!user) return alert("Log ind først");

  const title = prompt("Titel");
  const price = prompt("Pris");

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = async ()=>{
    const file = input.files[0];
    if(!file) return;

    try{
      const ref = storage.ref("images/" + Date.now());
      const snap = await ref.put(file);
      const url = await snap.ref.getDownloadURL();

      await db.collection("listings").add({
        title,
        price,
        image: url,
        user: user.uid,
        created: Date.now()
      });

      alert("Annonce oprettet ✅");
    }catch(e){
      console.error(e);
      alert("Fejl – tjek storage regler");
    }
  };

  input.click();
}

function deleteAd(id){
  db.collection("listings").doc(id).delete();
}

</script>

</body>
</html>
