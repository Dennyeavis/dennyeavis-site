<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Den Nye Avis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: #000;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    .listing {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <div>Den Nye Avis</div>
  <div>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <h2>Opret annonce</h2>

  <form id="form">
    <input id="title" placeholder="Titel" required>
    <input id="price" placeholder="Pris" required>
    <input id="city" placeholder="By">
    <input id="category" placeholder="Kategori">
    <textarea id="desc" placeholder="Beskrivelse"></textarea>
    <button type="submit">Opret</button>
  </form>

  <h2>Annoncer</h2>
  <div id="list"></div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://qtmztxqmmqutwxwqdovr.supabase.co",
  "sb_publishable_PTIwcCiqVU7OswHw5Q-w7Q_nRHQzzJP"
);

let user = null;

/* LOGIN */
async function login() {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://dennyeavis.github.io/dennyeavis-site/"
    }
  });
}

/* LOGOUT */
async function logout() {
  await supabase.auth.signOut();
}

/* SESSION */
supabase.auth.onAuthStateChange((event, session) => {
  user = session?.user || null;
  console.log("User:", user);
});

/* LOAD LISTINGS */
async function load() {
  let { data, error } = await supabase.from("listings").select("*");

  if (error) {
    console.log(error);
    return;
  }

  document.getElementById("list").innerHTML =
    (data || []).map(l => `
      <div class="listing">
        <h3>${l.title}</h3>
        <p>${l.description || ""}</p>
        <strong>${l.price} DKK</strong>
      </div>
    `).join("");
}

/* CREATE LISTING */
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  if (!user) {
    alert("Du skal logge ind først");
    return;
  }

  await supabase.from("listings").insert([{
    title: title.value,
    price: price.value,
    city: city.value,
    category: category.value,
    description: desc.value,
    user_id: user.id
  }]);

  load();
};

load();
</script>

</body>
</html>
