<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
header{background:#003399;color:#fff;padding:15px;display:flex;justify-content:space-between}
button{padding:8px 12px;margin:2px;border:none;border-radius:8px;background:#ffcc00}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px}
</style>
</head>
<body>

<header>
<div><b>Den Nye Avis</b></div>
<div>
<span id="user">Ikke logget ind</span>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="openModal()">Ny annonce</button>
</div>
</header>

<div class="grid" id="listings"></div>

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008">
<div style="background:#fff;padding:20px;margin:50px auto;width:300px">
<h3>Ny annonce</h3>
<input id="title" placeholder="Titel"><br>
<input id="price" placeholder="Pris"><br><br>
<button onclick="save()">Gem</button>
<button onclick="closeModal()">Luk</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;

// 🔐 LOGIN
function login(){
  const email = prompt("Email:");
  const password = prompt("Kode:");

  if(!email || !password) return;

  auth.signInWithEmailAndPassword(email,password)
  .then(()=>alert("Logget ind"))
  .catch(()=>{
    auth.createUserWithEmailAndPassword(email,password)
    .then(()=>alert("Bruger oprettet"))
    .catch(e=>alert(e.message));
  });
}

// 🚪 LOGOUT
function logout(){
  auth.signOut().then(()=>alert("Logget ud"));
}

// 👤 STATUS
auth.onAuthStateChanged(user=>{
  currentUser = user;

  if(user){
    document.getElementById("user").innerText = "✅ " + user.email;
  } else {
    document.getElementById("user").innerText = "❌ Ikke logget ind";
  }

  loadAds();
});

// 📦 LOAD ADS
function loadAds(){
  const container = document.getElementById("listings");

  db.collection("listings").onSnapshot(snapshot=>{
    container.innerHTML="";

    snapshot.forEach(doc=>{
      const d = doc.data();

      const div = document.createElement("div");
      div.className="card";

      div.innerHTML = `
        <h4>${d.title}</h4>
        <p>${d.price} kr</p>
      `;

      container.appendChild(div);
    });
  });
}

// ➕ NY ANNONCE
function openModal(){
  if(!currentUser) return alert("Log ind først");
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function save(){
  if(!currentUser) return alert("Log ind først");

  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;

  if(!title || !price) return alert("Udfyld felter");

  db.collection("listings").add({
    title,
    price,
    user: currentUser.uid,
    created: Date.now()
  })
  .then(()=>{
    alert("Annonce oprettet");
    closeModal();
  })
  .catch(e=>alert(e.message));
}

</script>

</body>
</html>
