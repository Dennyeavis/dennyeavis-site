<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis 🚀 FINAL BOSS</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff}
header{background:linear-gradient(90deg,#003399,#00c853);padding:15px;display:flex;justify-content:space-between;flex-wrap:wrap}
button{padding:8px 12px;margin:2px;border:none;border-radius:20px;background:#ffcc00;cursor:pointer;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px}
.card{background:#1e293b;padding:12px;border-radius:16px}
img{border-radius:10px}
</style>
</head>
<body>

<header>
<div><b>Den Nye Avis 🚀</b></div>
<div>
<span id="user">Ikke logget ind</span>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="toggleMyAds()">Mine annoncer</button>
<button onclick="openModal()">+ Opret</button>
</div>
</header>

<div class="grid" id="listings"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a",
  storageBucket: "dennyeavis-f2b4a.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

let currentUser=null;
let showMine=false;

function login(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}
function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
  currentUser=user;
  document.getElementById("user").innerText=user?"✅ "+user.email:"❌ Ikke logget ind";
  loadAds();
});

function toggleMyAds(){
  showMine=!showMine;
  loadAds();
}

function loadAds(){
  const container=document.getElementById("listings");

  db.collection("listings").orderBy("created","desc").onSnapshot(snap=>{
    container.innerHTML="";

    snap.forEach(doc=>{
      const d=doc.data();

      if(showMine && currentUser && d.user!==currentUser.uid) return;

      const div=document.createElement("div");
      div.className="card";

      const images = d.images || [d.image];

      let gallery = "";
      images.forEach(img=>{
        gallery += `<img src="${img}" width="100%">`;
      });

      div.innerHTML=`
        ${gallery}
        <h3>${d.title}</h3>
        <p>${d.price} kr</p>

        ${currentUser && d.user===currentUser.uid?`
          <button onclick="deleteAd('${doc.id}')">Slet</button>
        `:""}
      `;

      container.appendChild(div);
    });
  });
}

// 🚀 MULTI IMAGE UPLOAD
function openModal(){
  if(!currentUser) return alert("Log ind først");

  const title = prompt("Titel");
  const price = prompt("Pris");

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.multiple = true;

  input.onchange = async () => {
    const files = input.files;
    if(!files.length) return;

    const urls=[];

    for(let file of files){
      const ref = storage.ref("images/" + Date.now() + "_" + file.name);
      const snap = await ref.put(file);
      const url = await snap.ref.getDownloadURL();
      urls.push(url);
    }

    await db.collection("listings").add({
      title,
      price,
      image: urls[0],
      images: urls,
      user: currentUser.uid,
      created: Date.now()
    });

    alert("Annonce oprettet med flere billeder 📸🔥");
  };

  input.click();
}

function deleteAd(id){
  if(confirm("Slet annonce?")){
    db.collection("listings").doc(id).delete();
  }
}

</script>

</body>
</html>
