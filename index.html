<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Den Nye Avis</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px; }
input, textarea { width:100%; margin:5px 0; padding:10px; }
button { padding:10px 15px; margin-top:10px; }
.card { background:#222; padding:15px; margin-top:10px; border-radius:10px; }
</style>
</head>

<body>

<h1>Den Nye Avis</h1>

<button onclick="login()">Login med Google</button>
<button onclick="logout()">Logout</button>

<h2>Opret annonce</h2>

<form id="form">
<input id="title" placeholder="Titel" required>
<input id="price" type="number" placeholder="Pris" required>
<input id="city" placeholder="By" required>
<input id="category" placeholder="Kategori" required>
<textarea id="desc" placeholder="Beskrivelse"></textarea>
<button type="submit">Opret</button>
</form>

<h2>Annoncer</h2>
<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
  "https://qtmztxqmmqutwxwqdovr.supabase.co",
  "sb_publishable_PTIwcCiqVU7OswHw5Q-w7Q_nRHQzzJP"
);

let user = null;

/* 🔐 LOGIN */
async function login(){
  const { error } = await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.href
    }
  });

  if(error){
    alert(error.message);
  }
}

/* 🚪 LOGOUT */
async function logout(){
  await supabase.auth.signOut();
  user = null;
  alert("Logget ud");
}

/* 🔁 CHECK USER (vigtigt!) */
async function checkUser(){
  const { data } = await supabase.auth.getUser();
  user = data?.user || null;
  console.log("USER:", user);
}

checkUser();

/* 🔄 LYTTER EFTER LOGIN */
supabase.auth.onAuthStateChange((event, session) => {
  user = session?.user || null;
  console.log("LOGIN STATE:", user);
  load();
});

/* 📦 LOAD DATA */
async function load(){
  const { data, error } = await supabase
    .from("listings")
    .select("*")
    .order("created_at", { ascending: false });

  console.log("DATA:", data);

  if(error){
    console.log(error);
    return;
  }

  document.getElementById("list").innerHTML =
    (data || []).map(l=>`
      <div class="card">
        <h3>${l.title || ''}</h3>
        <p>${l.description || ''}</p>
        <strong>${l.price || 0} DKK</strong>
        <br>${l.city || ''} - ${l.category || ''}
      </div>
    `).join("");
}

/* ➕ OPRET ANNONCE */
document.getElementById("form").onsubmit = async (e)=>{
  e.preventDefault();

  if(!user){
    alert("Login først");
    return;
  }

  const { error } = await supabase.from("listings").insert([{
    title: document.getElementById("title").value,
    price: Number(document.getElementById("price").value),
    description: document.getElementById("desc").value,
    city: document.getElementById("city").value,
    category: document.getElementById("category").value,
    image_urls: [],
    user_id: user.id,
    user_name: user.email
  }]);

  if(error){
    alert(error.message);
    return;
  }

  alert("Annonce oprettet!");

  document.getElementById("form").reset();
  load();
};

/* 🚀 START */
load();
</script>

</body>
</html>
