<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis 🚀 ULTRA WOW</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff;overflow-x:hidden}
header{background:linear-gradient(90deg,#003399,#00c853);padding:15px;display:flex;justify-content:space-between;flex-wrap:wrap}
button{padding:8px 12px;margin:2px;border:none;border-radius:20px;background:#ffcc00;cursor:pointer;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px}
.card{background:#1e293b;padding:12px;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,0.4);transition:0.3s}
.card:hover{transform:scale(1.05)}
.badge{background:#00c853;padding:4px 8px;border-radius:8px;font-size:10px}
.hero{padding:40px;text-align:center;background:linear-gradient(135deg,#1e3a8a,#0f172a)}
.glow{animation:glow 2s infinite alternate}
@keyframes glow{from{text-shadow:0 0 10px #00c853}to{text-shadow:0 0 20px #00c853}}
.toast{position:fixed;bottom:20px;left:20px;background:#00c853;color:#fff;padding:10px;border-radius:10px}
</style>
</head>
<body>

<header>
<div class="glow"><b>Den Nye Avis 🚀</b></div>
<div>
<span id="user">Ikke logget ind</span>
<button onclick="googleLogin()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="toggleMyAds()">Mine annoncer</button>
<button onclick="openModal()">+ Opret</button>
</div>
</header>

<div class="hero">
<h1 class="glow">🔥 Danmarks nye markedsplads 🔥</h1>
<p id="live">200 personer kigger lige nu 👀</p>
<button onclick="openModal()">Sælg noget nu</button>
</div>

<div class="grid" id="listings"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser=null;
let showMine=false;

function googleLogin(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
  currentUser=user;
  document.getElementById("user").innerText=user?"✅ "+user.email:"❌ Ikke logget ind";
  loadAds();
});

function toggleMyAds(){showMine=!showMine;loadAds();}

function loadAds(){
  const container=document.getElementById("listings");

  db.collection("listings").orderBy("created","desc").onSnapshot(snap=>{
    container.innerHTML="";

    snap.forEach(doc=>{
      const d=doc.data();
      if(showMine && currentUser && d.user!==currentUser.uid)return;

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <div class="badge">🔥 HOT</div>
        <img src="${d.image||'https://via.placeholder.com/200'}" width="100%">
        <h3>${d.title}</h3>
        <p>${d.price} kr</p>
        <button onclick="chat('${doc.id}')">💬 Chat</button>
        <button onclick="share()">📢 Del</button>
      `;

      container.appendChild(div);
    });
  });
}

function chat(id){
  showToast("💬 Ny besked sendt!");
}

function share(){
  window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(window.location.href));
}

function openModal(){
  if(!currentUser)return alert("Log ind først");
  const title=prompt("Titel");
  const price=prompt("Pris");

  db.collection("listings").add({title,price,user:currentUser.uid,created:Date.now()});
}

// 🔥 live counter
setInterval(()=>{
  const num=Math.floor(Math.random()*400+100);
  document.getElementById("live").innerText=num+" personer kigger lige nu 👀";
},2000);

// 🔥 sold popup
setInterval(()=>{
  showToast("🔥 En annonce blev lige solgt!");
},8000);

// 🔥 toast
function showToast(text){
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=text;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// confetti
setInterval(()=>{
  const el=document.createElement('div');
  el.innerText="🎉";
  el.style.position='fixed';
  el.style.left=Math.random()*100+'%';
  el.style.top='0';
  el.style.fontSize='25px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
},1200);

</script>

</body>
</html>
