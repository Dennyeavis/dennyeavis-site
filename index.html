<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis 💰 MONEY MODE</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff}
header{background:linear-gradient(90deg,#003399,#00c853);padding:15px;display:flex;justify-content:space-between;flex-wrap:wrap}
button{padding:8px 12px;margin:2px;border:none;border-radius:20px;background:#ffcc00;cursor:pointer;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px}
.card{background:#1e293b;padding:12px;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,0.4)}
.badge{background:#00c853;padding:4px 8px;border-radius:8px;font-size:10px}
.top{background:#ff5252}
.moneybar{position:fixed;bottom:0;width:100%;background:#003399;padding:10px;display:flex;justify-content:space-between}
</style>
</head>
<body>

<header>
<div><b>Den Nye Avis 🚀</b></div>
<div>
<span id="user">Ikke logget ind</span>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="openModal()">+ Opret</button>
</div>
</header>

<div class="grid" id="listings"></div>

<div class="moneybar">
<div>💰 Tjen penge på dine annoncer</div>
<button onclick="showPricing()">Se priser</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser=null;

function login(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}
function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
  currentUser=user;
  document.getElementById("user").innerText=user?"✅ "+user.email:"❌ Ikke logget ind";
  loadAds();
});

function loadAds(){
  const container=document.getElementById("listings");

  db.collection("listings").orderBy("created","desc").onSnapshot(snap=>{
    container.innerHTML="";

    snap.forEach(doc=>{
      const d=doc.data();

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <div class="badge ${d.premium?'top':''}">${d.premium?'⭐ PREMIUM':'Gratis'}</div>
        <h3>${d.title}</h3>
        <p>${d.price} kr</p>

        <button onclick="buyBoost('${doc.id}')">🚀 Boost (19 kr)</button>
        <button onclick="buyPremium('${doc.id}')">⭐ Premium (49 kr)</button>

        ${currentUser && d.user===currentUser.uid?`<button onclick="deleteAd('${doc.id}')">Slet</button>`:""}
      `;

      container.appendChild(div);
    });
  });
}

// 💰 MOBILEPAY FLOW
function buyBoost(id){
  window.open("https://mobilepay.dk");
  alert("Send 19 kr til 22473434 og skriv annonce titel");
  markPending(id,"boost");
}

function buyPremium(id){
  window.open("https://mobilepay.dk");
  alert("Send 49 kr til 22473434 og skriv annonce titel");
  markPending(id,"premium");
}

function markPending(id,type){
  db.collection("payments").add({
    adId:id,
    type:type,
    user:currentUser?currentUser.uid:"guest",
    created:Date.now(),
    status:"pending"
  });
}

// 🔥 ADMIN: GODKEND BETALING (manual)
function approvePayment(adId){
  db.collection("listings").doc(adId).update({premium:true});
  alert("Premium aktiveret 💰");
}

function openModal(){
  if(!currentUser)return alert("Log ind først");
  const title=prompt("Titel");
  const price=prompt("Pris");

  db.collection("listings").add({
    title,price,user:currentUser.uid,created:Date.now(),premium:false
  });
}

function deleteAd(id){db.collection("listings").doc(id).delete();}

function showPricing(){
  alert("Gratis annoncer\nBoost: 19 kr\nPremium: 49 kr");
}

</script>

</body>
</html>
